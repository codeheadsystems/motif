<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motif</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .sidebar { min-height: calc(100vh - 56px); }
    .entity-card { cursor: pointer; }
    .entity-card:hover { background-color: var(--bs-light); }
    #app-content { min-height: calc(100vh - 56px); }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">Motif</span>
    <div id="nav-user" class="d-none dropdown">
      <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" id="nav-user-dropdown" data-bs-toggle="dropdown" aria-expanded="false">
        <span id="nav-username"></span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="nav-user-dropdown">
        <li><button class="dropdown-item" id="btn-profile">Profile</button></li>
        <li><button class="dropdown-item" id="btn-change-password">Change Password</button></li>
        <li><hr class="dropdown-divider"></li>
        <li><button class="dropdown-item text-danger" id="btn-logout">Logout</button></li>
      </ul>
    </div>
  </nav>
  <div id="app-content" class="container-fluid p-0">
    <!-- Rendered by app.ts -->
  </div>

  <!-- Profile Modal -->
  <div class="modal fade" id="modal-profile" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="profile-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal fade" id="modal-change-password" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="form-change-password">
            <div class="mb-3">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="cp-old-pass" required />
            </div>
            <div class="mb-3">
              <label class="form-label">New Password</label>
              <input type="password" class="form-control" id="cp-new-pass" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password</label>
              <input type="password" class="form-control" id="cp-confirm-pass" required />
            </div>
            <div id="cp-message"></div>
            <button type="submit" class="btn btn-primary w-100">Change Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
