server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

databaseUrl: jdbc:postgresql://db:5432/motif
databaseUser: motif
databasePassword: motif

context: motif-opaque-v1
allowIdentityKsf: false
argon2MemoryKib: 16384
argon2Iterations: 3
argon2Parallelism: 1

corsAllowedOrigins:
  - "http://localhost:8080"
  - "http://localhost:5173"
