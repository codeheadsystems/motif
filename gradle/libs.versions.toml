# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
assertj = "3.27.7"
caffeine = "3.2.3"
dagger = "2.59.2"
dropwizard = "5.0.1"
flyway = "12.3.0"
hofmann = "1.3.2"
jdbi3 = "3.52.1"
jspecify = "1.0.0"
nimbus-jose-jwt = "10.9"
jsr305 = "3.0.2"
junit-jupiter = "6.0.3"
mockito = "5.23.0"
postgresql = "42.7.10"
testcontainers = "2.0.4"

[libraries]
assertj = { module = "org.assertj:assertj-core", version.ref = "assertj" }
caffeine = { module = "com.github.ben-manes.caffeine:caffeine", version.ref = "caffeine" }
jspecify = { module = "org.jspecify:jspecify", version.ref = "jspecify" }
nimbus-jose-jwt = { module = "com.nimbusds:nimbus-jose-jwt", version.ref = "nimbus-jose-jwt" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
mockito = { module = "org.mockito:mockito-core", version.ref = "mockito" }
mockito-junit = { module = "org.mockito:mockito-junit-jupiter", version.ref = "mockito" }
testcontainers-bom = { module = "org.testcontainers:testcontainers-bom", version.ref = "testcontainers" }
testcontainers-core = { module = "org.testcontainers:testcontainers" }
testcontainers-junit = { module = "org.testcontainers:testcontainers-junit-jupiter" }
testcontainers-postgresql = { module = "org.testcontainers:testcontainers-postgresql" }

# Dropwizard
dropwizard-core = { module = "io.dropwizard:dropwizard-core", version.ref = "dropwizard" }
dropwizard-testing = { module = "io.dropwizard:dropwizard-testing", version.ref = "dropwizard" }

# Hofmann (OPAQUE authentication)
hofmann-dropwizard = { module = "com.codeheadsystems:hofmann-dropwizard", version.ref = "hofmann" }
hofmann-client = { module = "com.codeheadsystems:hofmann-client", version.ref = "hofmann" }

# Dependency Injection
dagger = { module = "com.google.dagger:dagger", version.ref = "dagger" }
dagger-compiler = { module = "com.google.dagger:dagger-compiler", version.ref = "dagger" }
inject = { module = "javax.inject:javax.inject", version = "1" }
jsr305 = { module = "com.google.code.findbugs:jsr305", version.ref = "jsr305" }

# db
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway" }
jdbi3-core = { module = "org.jdbi:jdbi3-core", version.ref = "jdbi3" }
jdbi3-sqlobject = { module = "org.jdbi:jdbi3-sqlobject", version.ref = "jdbi3" }
jdbi3-postgres = { module = "org.jdbi:jdbi3-postgres", version.ref = "jdbi3" }
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }

[bundles]
core = ["jspecify", "caffeine", "inject", "nimbus-jose-jwt"]
dropwizard = ["dropwizard-core"]
di = ["dagger", "dagger-compiler", "jsr305"]
db = ["flyway-core", "flyway-postgresql", "jdbi3-core", "jdbi3-sqlobject", "jdbi3-postgres", "postgresql"]
testing = ["assertj", "junit-jupiter", "mockito", "mockito-junit"]