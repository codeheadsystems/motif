name: Secret Scan

# The gitleaks/gitleaks-action wrapper requires a paid license for org repos
# (https://gitleaks.io/products.html). The gitleaks binary itself is open source
# and free for everyone, so this workflow installs and runs it directly.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks inspects commit history; full fetch is needed on PRs
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan repo
        # `detect` walks committed history; `--no-banner` keeps logs clean.
        # Exit code 1 = leaks found (fails the job); 0 = clean.
        run: gitleaks detect --no-banner --redact --verbose
